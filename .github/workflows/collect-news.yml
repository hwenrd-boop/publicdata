name: Collect Parking News

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run collector
        run: python scripts/collect_news.py

      - name: Commit and push
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add data/articles.json index.html
          git diff --cached --quiet || git commit -m "chore: update parking news $(date +%Y-%m-%d)"
          git push
